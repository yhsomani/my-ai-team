spring:
  application:
    name: talentsphere-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p trace=%X{traceId:-} span=%X{spanId:-} thread=%t logger=%c{36} msg=%m%n"

talentsphere:
  runtime:
    mode: modular-monolith
