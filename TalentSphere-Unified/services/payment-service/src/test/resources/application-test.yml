spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8098

talentsphere:
  feature-flags:
    enable_payments: true
    enable_subscriptions: true
    enable_refunds: true