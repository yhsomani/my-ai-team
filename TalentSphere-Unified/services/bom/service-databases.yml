# TalentSphere Per-Service Database Configuration
# Version: 3.0.1
# Each service owns its dedicated database

databases:
  auth_service:
    name: auth_db
    host: ${DB_HOST:localhost}
    port: 5432
    user: ${AUTH_DB_USER:auth_user}
    password: ${AUTH_DB_PASSWORD}
    pool_size: 20
    
  user_service:
    name: user_db
    host: ${DB_HOST:localhost}
    port: 5432
    user: ${USER_DB_USER:user_user}
    password: ${USER_DB_PASSWORD}
    pool_size: 20
    
