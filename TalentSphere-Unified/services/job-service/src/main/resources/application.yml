spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://ts-postgres:5432/job_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  cache:
    type: redis
    redis:
      time-to-live: 300000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      elasticsearch:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      elasticsearch:
        maxAttempts: 3
        waitDuration: 2s
  rateLimiter:
    instances:
      api:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
