version: '3.8'

services:
  ts-rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ts-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  ts-redis:
    image: redis:7-alpine
    container_name: ts-redis
    ports:
      - "6379:6379"

  ts-elasticsearch:
    image: elasticsearch:8.13.2
    container_name: ts-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  auth-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
      args:
        MODULE: services/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db.rgmcjqhvsguzkzopxuax.supabase.co:5432/postgres?sslmode=require
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_DB_PASSWORD:-talentsphere}
      SPRING_RABBITMQ_HOST: ts-rabbitmq
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - ts-rabbitmq

  user-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
      args:
        MODULE: services/user-service
    container_name: user-service
