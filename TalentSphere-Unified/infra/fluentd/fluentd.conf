# TalentSphere Fluentd Log Aggregation Configuration
# Ships JSON logs to Elasticsearch/OpenSearch

<source>
  @type tail
  @id input-docker
  path /var/lib/docker/containers/*/*.log
  pos_file /var/log/fluentd-docker.log.pos
  tag docker.*
  <parse>
    @type json
    time_format %Y-%m-%dT%H:%M:%S.%N%z
  </parse>
</source>

<source>
  @type tail
  @id input-spring
  path /var/log/talentsphere/*.log
  pos_file /var/log/fluentd-spring.log.pos
  tag talentsphere.
  <parse>
    @type multi_format
    <pattern>
      @type regexp
      pattern ^(?<time>[^ ]*) \[(?<thread>[^\]]*)\] (?<level>[^ ]*) (?<message>.*)$
      time_format %Y-%m-%d %H:%M:%S
    </pattern>
    <pattern>
      @type json
    </pattern>
  </parse>
</source>

<filter docker.**
  @type record_transformer
  <record>
    service ${tag_parts[-2]}
    environment ${ENVIRONMENT}
  </record>
</filter>

<filter talentsphere.**
  @type record_transformer
  <record>
    service ${tag_parts[1]}
    environment ${ENVIRONMENT:-development}
    @timestamp ${time}
  </record>
</filter>

<match talentsphere.**>
  @type elasticsearch
  host ${ES_HOST:-localhost}
  port ${ES_PORT:-9200}
  index_name talentsphere-logs
  type_name _doc
  logstash_format true
  logstash_prefix talentsphere
  include_timestamp true
  <buffer>
    @type file
    path /var/log/fluentd/buffer/elasticsearch
    flush_mode interval
    flush_interval 10s
  </buffer>
</match>

<match docker.**>
  @type elasticsearch
  host ${ES_HOST:-localhost}
  port ${ES_PORT:-9200}
  index_name talentsphere-docker
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffer/docker
    flush_mode interval
    flush_interval 30s
  </buffer>
</match># Fluentd output to stdout (for local development)
<match **>
  @type stdout
</match>