apiVersion: batch/v1
kind: CronJob
metadata:
  name: saved-search-digest-discovery
  labels:
    app: saved-search-digest-discovery
    component: notification-digest
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: saved-search-digest-discovery
            component: notification-digest
        spec:
          restartPolicy: Never
          containers:
            - name: saved-search-digest-discovery
              image: talentsphere/notification-digest-scheduler:latest
              imagePullPolicy: IfNotPresent
              command: ["npm", "run", "discover:saved-search-digests", "--", "--commit"]
              envFrom:
                - configMapRef:
                    name: talentsphere-config
                - secretRef:
                    name: talentsphere-secrets
              env:
                - name: SAVED_SEARCH_DIGEST_MAX_SEARCHES
                  value: "500"
                - name: SAVED_SEARCH_DIGEST_MAX_JOBS
                  value: "1000"
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
                  cpu: 250m
---
