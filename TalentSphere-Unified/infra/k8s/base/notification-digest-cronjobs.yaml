metadata:
  name: notification-digest-delivery
  labels:
    app: notification-digest-delivery
    component: notification-digest
spec:
  schedule: "5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: notification-digest-delivery
            component: notification-digest
