apiVersion: v1
kind: Namespace
metadata:
  name: talentsphere
  labels:
    name: talentsphere
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: talentsphere-config
  namespace: talentsphere
data:
  SPRING_RABBITMQ_HOST: "ts-rabbitmq"
  SPRING_REDIS_HOST: "ts-redis"
  SPRING_ELASTICSEARCH_HOSTS: "http://ts-elasticsearch:9200"
  SPRING_PROFILES_ACTIVE: "production"
# Runtime secret values are intentionally supplied outside source as
# talentsphere-secrets; do not commit placeholder Secret data here.
---
apiVersion: v1
kind: Service
metadata:
  name: ts-postgres
  namespace: talentsphere
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ts-redis
  namespace: talentsphere
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: ts-rabbitmq
  namespace: talentsphere
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: 5672
    - port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: ts-elasticsearch
  namespace: talentsphere
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
