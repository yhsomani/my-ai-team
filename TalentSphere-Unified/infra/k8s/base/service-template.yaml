apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  namespace: talentsphere
  labels:
    app: SERVICE_NAME
    tier: backend
spec:
  replicas: REPLICA_COUNT
  selector:
    matchLabels:
      app: SERVICE_NAME
  template:
    metadata:
      labels:
        app: SERVICE_NAME
        tier: backend
    spec:
      containers:
      - name: SERVICE_NAME
        image: talentsphere/SERVICE_NAME:TAG
        ports:
        - containerPort: PORT
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://ts-postgres:5432/DB_NAME"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: talentsphere-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_RABBITMQ_HOST
          value: "ts-rabbitmq"
        - name: SPRING_REDIS_HOST
          value: "ts-redis"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: PORT
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: PORT
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: SERVICE_NAME
  namespace: talentsphere
spec:
  type: ClusterIP
  ports:
  - port: PORT
    targetPort: PORT
  selector:
    app: SERVICE_NAME