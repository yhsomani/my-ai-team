apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  labels:
    app: application-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
      - name: application-service
        image: talentsphere/application-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: talentsphere-config
        - secretRef:
            name: talentsphere-secrets
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: application-service
  labels:
    app: application-service
spec:
  selector:
    app: application-service
  ports:
  - port: 8086
    targetPort: 8086
