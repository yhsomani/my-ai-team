worker_processes auto;
events { worker_connections 1024; }

http {
  # ── Resolver for Dynamic Upstream Resolution ──
  # 127.0.0.11 is the Docker internal DNS
  resolver 127.0.0.11 valid=30s;

  # ── Rate Limiting ──
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # ── Global Headers: Aurora Protocol Signature ──
  add_header X-Aurora-Signature "TALENT-SPHERE-V4.0-NEXUS";

  # ── Logging ──
  log_format json_combined escape=json
  '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id"'
  '}';

  access_log /var/log/nginx/access.log json_combined;

  server {
    listen 8080;
    
    # Enable Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Auth API ──
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      set $auth_upstream http://auth-service:8081;
      proxy_pass $auth_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Job API ──
    location /api/v1/jobs/ {
      limit_req zone=api burst=20 nodelay;
      set $job_upstream http://job-service:8084;
      proxy_pass $job_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Profile API ──
    location /api/v1/profile/ {
      limit_req zone=api burst=30 nodelay;
      set $profile_upstream http://profile-service:8083;
      proxy_pass $profile_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Search API ──
    location /api/v1/search/ {
      limit_req zone=api burst=30 nodelay;
      set $search_upstream http://search-service:8091;
      proxy_pass $search_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── AI API ──
    location /api/v1/ai/ {
      limit_req zone=api burst=10 nodelay;
      set $ai_upstream http://ai-service:8096;
      proxy_pass $ai_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Application API ──
    location /api/v1/applications/ {
      limit_req zone=api burst=20 nodelay;
      set $app_upstream http://application-service:8086;
      proxy_pass $app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Challenge API ──
    location /api/v1/challenges/ {
      limit_req zone=api burst=20 nodelay;
      set $challenge_upstream http://challenge-service:8087;
      proxy_pass $challenge_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Gamification API ──
    location /api/v1/gamification/ {
      limit_req zone=api burst=20 nodelay;
      set $gamification_upstream http://gamification-service:8092;
      proxy_pass $gamification_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Messaging API ──
    location /api/v1/messages/ {
      limit_req zone=api burst=30 nodelay;
      set $messaging_upstream http://messaging-service:8094;
      proxy_pass $messaging_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Networking API ──
    location /api/v1/networking/ {
      limit_req zone=api burst=30 nodelay;
      set $networking_upstream http://networking-service:8095;
      proxy_pass $networking_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── LMS API ──
    location /api/v1/lms/ {
      limit_req zone=api burst=20 nodelay;
      set $lms_upstream http://lms-service:8085;
      proxy_pass $lms_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Company API ──
    location /api/v1/companies/ {
      limit_req zone=api burst=20 nodelay;
      set $company_upstream http://company-service:8088;
      proxy_pass $company_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Payment API ──
    location /api/v1/payments/ {
      limit_req zone=api burst=20 nodelay;
      set $payment_upstream http://payment-service:8098;
      proxy_pass $payment_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── File API ──
    location /api/v1/files/ {
      limit_req zone=api burst=30 nodelay;
      set $file_upstream http://file-service:8100;
      proxy_pass $file_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Fallback for other V1 APIs ──
    # Map any other v1 requests to user-service by default
    location /api/v1/ {
      limit_req zone=api burst=50 nodelay;
      set $user_upstream http://user-service:8082;
      proxy_pass $user_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    # ── Notification WebSocket / API ──
    location /api/v1/notifications/ {
       set $notif_upstream http://notification-service:8089;
       proxy_pass $notif_upstream;
       proxy_set_header Host $host;
       proxy_set_header X-Request-ID $request_id;
    }

    location /socket.io/ {
      set $notif_ws_upstream http://notification-service:8089;
      proxy_pass $notif_ws_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # ── Chat WebSocket ──
    location /ws-chat/ {
      set $chat_ws_upstream http://chat-service:8097;
      proxy_pass $chat_ws_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # ── Frontend (SPA) ──
    location / {
      set $frontend_upstream http://frontend:5173;
      proxy_pass $frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
