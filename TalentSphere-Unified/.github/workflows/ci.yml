name: TalentSphere Platform CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Verify Frontend React Application
  build-frontend:
    name: Build Frontend UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: |
          cd frontend
          npm ci
      - name: Validate TypeScript & Build
        run: |
          cd frontend
          npm run build

  # 2. Verify Backend Microservices (Maven)
  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build All Services
        run: mvn clean install -DskipTests
